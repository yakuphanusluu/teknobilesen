<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>İletişim - TeknoBileşen.com</title>
        <link rel="stylesheet" href="taslak.css">
        <link rel="icon" href="Resimler/favicon/favicon.png" type="image/png">
        
        <style>
            /*CARD*/
            #section-2{
               display: flex;
               flex-direction: row;
               justify-content: space-around;
               margin: 100px 0; 
               align-items: flex-start;
            }
            .card, .contact-form {
                background-color: #158DBC;
                width: 45%;
                box-shadow: 0 5px 9px 0 rgba(0,0,0,0.4);
                border-radius: 6px;
                transition: transform 0.3s ease-in-out;
                animation: fadeIn 2s ease-in-out;
                margin: 15px 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .card a{
                color: black;
                text-decoration: none;
            }
            .card:hover{
                opacity: 0.7; 
                transform: scale(1.05);
            }
            .card img{
                width: 100%;
                height: 326px;
                object-fit: cover;
                border-radius: 6px 6px 0 0;
            }
            .container{
                padding: 5px 20px;
                color: white;
            }
            .container p{
                margin: 15px 0;
            }
            p{
                font-size: 19px;
            }
            /* Form Styles */
            .contact-form {
                padding: 20px;
                color: white;
            }
            .contact-form h2 {
                margin-bottom: 20px;
            }
            .contact-form label {
                display: block;
                margin-bottom: 10px;
            }
            .contact-form input, .contact-form textarea {
                width: 100%;
                padding: 10px;
                margin-bottom: 20px;
                border: none;
                border-radius: 4px;
            }
            .contact-form button {
                background-color: white;
                color: #158DBC;
                border: none;
                padding: 10px 20px;
                border-radius: 4px;
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <header> 
            <div class="logo">
                <a href="index.html">
                <img src="Resimler/Anamenü/tekno_bilesen_logo.svg">
                </a>
            </div>

            <div class="account-icon">
                <a href="login.php">
                <img src="Resimler/Anamenü/account_icon.svg">
                </a>
            </div>
        </header>

        <main>
            <section id="section-2">
                <div class="card">
                    <a href="https://www.instagram.com/teknobilesen/" target="_blank">
                    <img src="Resimler/İletişim/instagram.jpg" alt="">
                    <div class="container">
                        <h2>INSTAGRAM</h2>
                        <p>Instagram hesabımız aracılığıyla bize ulaşabilirsiniz.</p>
                    </div>
                    </a>
                </div>
            
                <!-- Contact Form Card -->
                <div class="contact-form">
                    <h2>Bize Ulaşın</h2>
                    <form id="contactForm" action="#" method="post">
                        <label for="name">Ad Soyad:</label>
                        <input type="text" id="name" name="name" required>
                        
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        
                        <label for="message">Mesaj:</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
                        
                        <button type="submit">Gönder</button>
                    </form>
                </div>
            </section>
        </main>

        <footer style="position: fixed; bottom: 0; width: 100%;">
                <div class="footer-content">
                <div class="text-1">teknobileşen.com © 2024</div>  
                <div class="text-2">  
                    <nav>             
                    <ul>
                        <li><a href="blog.html">Blog</a></li> | <li><a href="hakkimizda.html">Hakkımızda</a></li> | <li><a href="iletisim.html">İletişim</a></li>
                    </ul>
                </nav> 
                </div>
                </div>                        
            </footer>

        <script>
            document.getElementById('contactForm').addEventListener('submit', function(event) {
                event.preventDefault();
                alert('Formunuz gönderildi');
                this.submit();
            });
        </script>
    </body>
</html>
